<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auroral Glow // Key Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- Deep Winter Auroral Palette --- */
        :root {
            --bg-deep: #090b11;
            --glass-card: rgba(15, 19, 32, 0.45);
            --glass-border: rgba(214, 199, 255, 0.15);
            --text-light: #e6f7f4; /* Frosted Mint */
            --text-dim: #73849f;
            --aurora-cyan: #a5d5fe; /* Ice Blue */
            --aurora-purple: #d6c7ff; /* Cyber Lavender */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-light);
        }

        /* --- Full Screen Aurora Canvas --- */
        #auroraCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* --- Interface Window Card --- */
        .generator-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 360px;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 5;
        }

        .card-header {
            margin-bottom: 25px;
        }

        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .card-header span {
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* --- Display Output Screen --- */
        .output-box {
            background: rgba(11, 13, 22, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            min-height: 58px;
        }

        .output-box input {
            font-family: 'Fira Code', monospace;
            font-size: 1.05rem;
            color: var(--aurora-cyan);
            background: transparent;
            border: none;
            outline: none;
            width: 80%;
            pointer-events: none;
        }

        .copy-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-dim);
            transition: fill 0.2s ease, transform 0.2s ease;
        }

        .copy-btn:hover svg {
            fill: var(--aurora-purple);
            transform: scale(1.05);
        }

        /* --- Custom Controls Section --- */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .setting-label {
            font-size: 0.85rem;
            color: rgba(230, 247, 244, 0.85);
        }

        /* Custom Modern Range Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-wrapper span {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--aurora-cyan);
            width: 20px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--aurora-cyan);
            cursor: pointer;
            box-shadow: 0 0 10px var(--aurora-cyan);
            transition: transform 0.1s;
        }

        /* Custom Techy Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            transition: .3s;
        }

        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-dim);
            border-radius: 50%;
            transition: .3s;
        }

        input:checked + .slider-toggle {
            background-color: rgba(214, 199, 255, 0.2);
            border-color: var(--aurora-purple);
        }

        input:checked + .slider-toggle:before {
            transform: translateX(16px);
            background-color: var(--aurora-purple);
            box-shadow: 0 0 8px var(--aurora-purple);
        }

        /* --- Master Trigger Action --- */
        .generate-trigger {
            width: 100%;
            background: linear-gradient(90deg, var(--aurora-cyan), var(--aurora-purple));
            border: none;
            outline: none;
            padding: 14px;
            border-radius: 16px;
            color: var(--bg-deep);
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 10px 25px rgba(165, 213, 254, 0.15);
        }

        .generate-trigger:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <canvas id="auroraCanvas"></canvas>

    <div class="generator-card">
        <div class="card-header">
            <h2>Cipher Aurora</h2>
            <span>// QUANTUM_KEY_GEN</span>
        </div>

        <div class="output-box">
            <input type="text" id="password-display" readonly placeholder="Click Generate">
            <button class="copy-btn" id="copy-trigger" title="Copy Key to Clipboard">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
        </div>

        <div class="setting-row">
            <span class="setting-label">Entropy Length</span>
            <div class="slider-wrapper">
                <input type="range" id="length-slider" min="8" max="24" value="14">
                <span id="length-val">14</span>
            </div>
        </div>

        <div class="setting-row">
            <span class="setting-label">Include Special Vectors</span>
            <label class="switch">
                <input type="checkbox" id="symbols-toggle" checked>
                <span class="slider-toggle"></span>
            </label>
        </div>

        <div class="setting-row">
            <span class="setting-label">Include Numeric Nodes</span>
            <label class="switch">
                <input type="checkbox" id="numbers-toggle" checked>
                <span class="slider-toggle"></span>
            </label>
        </div>

        <button class="generate-trigger" id="gen-trigger">GENERATE_KEY</button>
    </div>

    <script>
        // --- Core Password Blueprint Engine ---
        const display = document.getElementById('password-display');
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const symbolsToggle = document.getElementById('symbols-toggle');
        const numbersToggle = document.getElementById('numbers-toggle');
        const genTrigger = document.getElementById('gen-trigger');
        const copyTrigger = document.getElementById('copy-trigger');

        const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

        lengthSlider.addEventListener('input', () => {
            lengthVal.innerText = lengthSlider.value;
        });

        function generatePassword() {
            let characterPool = letters;
            if (numbersToggle.checked) characterPool += numbers;
            if (symbolsToggle.checked) characterPool += symbols;

            let finalPassword = '';
            const passwordLength = parseInt(lengthSlider.value);

            for (let i = 0; i < passwordLength; i++) {
                const randomIndex = Math.floor(Math.random() * characterPool.length);
                finalPassword += characterPool[randomIndex];
            }

            display.value = finalPassword;
        }

        // ClipBoard Sync Action
        copyTrigger.addEventListener('click', () => {
            if (!display.value) return;
            navigator.clipboard.writeText(display.value);
            
            // Fast text notice switch feedback loop
            const oldPlaceholder = display.placeholder;
            display.value = '';
            display.placeholder = 'COPIED TO CLIPBOARD';
            
            setTimeout(() => {
                display.placeholder = oldPlaceholder;
                generatePassword();
            }, 1000);
        });

        genTrigger.addEventListener('click', generatePassword);
        window.addEventListener('DOMContentLoaded', generatePassword);


        // --- Beautiful Shifting Aurora Canvas Engine ---
        const canvas = document.getElementById('auroraCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let timeOffset = 0;

        function drawAurora() {
            ctx.clearRect(0, 0, width, height);
            
            // Base background fill matching deep winter canvas look
            ctx.fillStyle = '#090b11';
            ctx.fillRect(0, 0, width, height);

            // Shifting multi-layered cosmic gradient sweeps
            timeOffset += 0.002;

            for (let layer = 0; layer < 3; layer++) {
                ctx.beginPath();
                
                // Establish dynamic start anchor vectors
                let startY = height * (0.4 + layer * 0.1);
                ctx.moveTo(0, height);
                ctx.lineTo(0, startY);

                // Build graceful horizontal curve nodes using wave paths
                for (let x = 0; x <= width; x += 20) {
                    let wave1 = Math.sin(x * 0.002 + timeOffset + layer) * 80;
                    let wave2 = Math.cos(x * 0.001 - timeOffset * 1.5 + layer) * 40;
                    ctx.lineTo(x, startY + wave1 + wave2);
                }

                ctx.lineTo(width, height);
                ctx.closePath();

                // Setup color layer aesthetics
                let gradient = ctx.createLinearGradient(0, height * 0.3, 0, height);
                if (layer === 0) {
                    gradient.addColorStop(0, 'rgba(165, 213, 254, 0.06)'); // Cyan tint
                    gradient.addColorStop(0.6, 'rgba(214, 199, 255, 0.02)');
                } else if (layer === 1) {
                    gradient.addColorStop(0, 'rgba(214, 199, 255, 0.05)'); // Lavender tint
                    gradient.addColorStop(0.5, 'transparent');
                } else {
                    gradient.addColorStop(0, 'rgba(165, 213, 254, 0.04)');
                    gradient.addColorStop(0.7, 'transparent');
                }

                ctx.fillStyle = gradient;
                ctx.fill();
            }

            requestAnimationFrame(drawAurora);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        drawAurora();
    </script>
</body>
</html>
